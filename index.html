<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hangman Game</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/nyp6ghe.css">
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap"
        rel="stylesheet">
</head>

<body>

    <h1>Whistledown's Word Game </h1>
    <div class="subtitle">A most scandalous guessing game…</div>

    <div class="game-box"> <!-- big white box -->

        <div id="difficulty">
            <button onclick="setDifficulty(8)" class="modes">Easy</button> <!-- levels -->
            <button onclick="setDifficulty(6)" class="modes">Medium</button>
            <button onclick="setDifficulty(4)" class="modes">Hard</button>
        </div>

        <div id="game">
            <div class="word" id="wordDisplay"></div> <!-- word user is guessing -->

            <input type="text" id="guessInput" maxlength="1"> <!-- input box and guess button -->
            <button onclick="handleGuess()">Guess</button>

            <div class="message" id="message"></div> <!-- briderton messages -->
            <div class="letters">Letters Whispered: <span id="usedLetters"></span></div> <!-- guesses -->
            <div>Scandals Remaining: <span id="wrongCount"></span></div> <!-- lives left -->

            <img id="healthImage" src="images/8.png" alt="health"><!--  flowers -->

            <button class="seal-btn" onclick="restartGame()">Restart</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
