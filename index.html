<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hangman Game</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.typekit.net/nyp6ghe.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SCREEN 1: CHOOSE -->
    <div id="screen-choose" class="screen justify-content-center align-items-center">
        <div class="card-box2">
            <div class="card-second">
                <h1> Welcome to <b><i>Hangman</i></b></h1>
                <div class="container-fluid py-4">
                    <div class="row g-4">
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div class="card-tile blob">
                                <div class="card-title">
                                    <h1>EASY</h1>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div class="card-tile blob">
                                <div class="card-title">
                                    <h1>MEDIUM</h1>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div class="card-tile blob">
                                <div class="card-title">
                                    <h1>HARD</h1>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <h2> Will You Be Lucky?</h2>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: MAIN GAME -->
    <div id="screen-game" class="screen justify-content-center align-items-center">
        <div class="card-box1">
            <h3>Rock Paper Scissors (Bakery Edition)</h3>

            <div class="row mt-3">
                <div class="col">
                    <img id="playerPhotoGame" alt="Your photo">
                    <strong id="playerName"></strong>
                    <div class="hearts" id="playerHearts">❤️❤️❤️</div>
                </div>
                <div class="col">
                    <img class="gingyimg" src="gingy.png">
                    <strong>Gingerbread Man</strong>
                    <div class="hearts" id="computerHearts">❤️❤️❤️</div>
                </div>
            </div>

            <div class="result" id="roundResult"></div>

            <button class="btn backer mt-3" onclick="goChoose()">Next Round</button>
        </div>
    </div>

    <!-- SCREEN 4: GAME OVER -->
    <div id="screen-gameover" class="screen justify-content-center align-items-center">
        <div class="card-box1">
            <h2 id="gameOverText"></h2>
            <p id="press-quote">You Win!</p>
            <button class="btn backer mt-3" onclick="resetGame()">Play Again</button>
        </div>
    </div>







    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
